apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voting-staging
  namespace: argocd
  annotations:
    kargo.akuity.io/authorized-stage: craftista:voting-staging-stage
spec:
  project: craftista
  sources:
    - repoURL: https://github.com/vchandela/gitops-for-dummies
      targetRevision: main
      path: service-charts/voting
      helm:
        valueFiles:
          - $values/env/staging/voting/voting-values.yaml
    - repoURL: https://github.com/vchandela/gitops-for-dummies
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
